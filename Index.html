<!DOCTYPE html>
<html>
<head>
    <title>Abbeyskid</title>
    <style>
        body {
            background: linear-gradient(135deg, #000000, #1a1a1a);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
        }

        h1 {
            color: yellow;
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            margin: 10px;
        }

        .green {
            color: lightgreen;
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid red;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 25px;
            background: red;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            transition: 0.3s;
        }

        a:hover {
            background: darkred;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <img src="https://i.imgur.com/your-image.png" alt="profile">

    <h1>Abbeyskid</h1>

    <p>I am learning Computer Science</p>

    <p class="green">I will become a developer 💻</p>

    <a href="https://www.youtube.com" target="_blank">
        Visit YouTube
    </a>

</body>
</html>
